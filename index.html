<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>६४ स्वयम्भूव लिङ्ग — भ्रमण</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1b1712;
    --bg-2: #241e17;
    --panel: #2a2319;
    --stone: #3a3024;
    --marigold: #e8a33d;
    --brick: #b14a34;
    --belleaf: #7a9a68;
    --ash: #cfc6b4;
    --text: #eee3cf;
    --text-dim: #ab9f89;
    --border: rgba(232,163,61,0.22);
    --shadow: 0 12px 36px rgba(0,0,0,0.45);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Spectral', serif;
    overflow: hidden;
  }

  /* ---------- header ---------- */
  header{
    position: relative;
    z-index: 20;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 1rem;
    padding: 0.7rem 1.4rem;
    background: linear-gradient(180deg, var(--bg-2), var(--bg));
    border-bottom: 1px solid var(--border);
  }

  .brand{
    display:flex;
    align-items:baseline;
    gap: 0.65rem;
    min-width:0;
  }

  .brand .om{
    font-size: 1.35rem;
    color: var(--marigold);
    flex-shrink:0;
  }

  h1{
    margin:0;
    font-family: 'Noto Serif Devanagari', 'Spectral', serif;
    font-weight: 600;
    font-size: clamp(1.05rem, 2.6vw, 1.6rem);
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }

  h1 a{
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid var(--marigold);
    padding-bottom: 2px;
    transition: color .2s ease, border-color .2s ease;
  }
  h1 a:hover{ color: var(--marigold); }

  .subtitle{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 0.2rem;
  }

  .header-right{
    display:flex;
    align-items:center;
    gap: 0.7rem;
    flex-shrink:0;
  }

  .brand-logo{
    width: 68px;
    height: 68px;
    object-fit: contain;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    padding: 3px;
    flex-shrink:0;
  }

  .count-badge{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    color: var(--bg);
    background: var(--marigold);
    padding: 0.35rem 0.7rem;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink:0;
  }

  /* pagoda-tier edge under header */
  .pagoda-edge{
    height: 9px;
    width:100%;
    background:
      linear-gradient(135deg, var(--brick) 50%, transparent 50%) 0 0/16px 9px repeat-x,
      linear-gradient(-135deg, var(--brick) 50%, transparent 50%) 8px 0/16px 9px repeat-x;
    opacity: 0.85;
  }

  /* ---------- main layout ---------- */
  main{
    position: relative;
    height: calc(100% - 84px);
    width: 100%;
  }

  .map-wrap{
    position:absolute;
    inset:0;
  }
  .map-wrap iframe{
    width:100%;
    height:100%;
    border:0;
    filter: saturate(0.92) contrast(1.02);
  }

  /* ---------- legend panel ---------- */
  #legend-toggle{
    position:absolute;
    top: 16px;
    right: 16px;
    z-index: 15;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.8rem;
    cursor:pointer;
    box-shadow: var(--shadow);
    display:none;
  }

  .legend{
    position:absolute;
    top: 16px;
    right: 16px;
    z-index: 14;
    width: 320px;
    max-height: calc(100% - 32px);
    background: rgba(36,30,23,0.94);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .legend-head{
    padding: 0.85rem 1rem 0.7rem;
    border-bottom: 1px solid var(--border);
    background: var(--stone);
    flex-shrink:0;
  }

  .legend-head .label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--marigold);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .legend-head .label .close-btn{
    cursor:pointer;
    color: var(--text-dim);
    font-size: 0.9rem;
    line-height:1;
  }
  .legend-head .label .close-btn:hover{ color: var(--brick); }

  .legend-head input{
    margin-top: 0.55rem;
    width:100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Spectral', serif;
    font-size: 0.85rem;
    padding: 0.4rem 0.6rem;
  }
  .legend-head input::placeholder{ color: var(--text-dim); }
  .legend-head input:focus{ outline: none; border-color: var(--marigold); }

  .legend-body{
    overflow-y: auto;
    padding: 0.4rem 0 0.6rem;
  }
  .legend-body::-webkit-scrollbar{ width: 7px; }
  .legend-body::-webkit-scrollbar-thumb{ background: var(--stone); border-radius: 4px; }
  .legend-body::-webkit-scrollbar-track{ background: transparent; }

  .district-group{ margin-top: 0.3rem; }

  .district-name{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--belleaf);
    padding: 0.35rem 1rem 0.2rem;
  }

  ul.linga-list{
    list-style:none;
    margin:0;
    padding:0 0.6rem;
  }

  li.linga-item{
    display:flex;
    align-items:flex-start;
    gap: 0.55rem;
    padding: 0.32rem 0.4rem;
    border-radius: 6px;
    transition: background .15s ease;
  }
  li.linga-item:hover{ background: rgba(232,163,61,0.08); }

  .bead{
    flex-shrink:0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #f4c877, var(--marigold) 60%, var(--brick) 100%);
    color: var(--bg);
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    font-weight: 600;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top: 1px;
  }

  .linga-text{ min-width:0; }
  .linga-name{
    font-size: 0.87rem;
    line-height:1.25;
    color: var(--text);
  }
  .linga-place{
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family:'IBM Plex Mono', monospace;
    margin-top: 1px;
  }

  .legend-foot{
    flex-shrink:0;
    padding: 0.5rem 1rem;
    border-top: 1px solid var(--border);
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  .legend-foot a{ color: var(--marigold); text-decoration:none; }

  #no-match{
    display:none;
    padding: 1rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    text-align:center;
  }

  /* ---------- responsive ---------- */
  @media (max-width: 640px){
    header{ padding: 0.6rem 1rem; }
    .subtitle{ display:none; }
    .brand-logo{ width: 48px; height: 48px; }
    .legend{
      top: auto;
      bottom: 0;
      right: 0;
      left: 0;
      width: 100%;
      max-height: 62vh;
      border-radius: 14px 14px 0 0;
    }
    #legend-toggle{ display:block; top:auto; bottom:16px; right:16px; }
    .legend.collapsed{ display:none; }
  }
</style>
</head>

  function district(loc){
    const parts = loc.split(",").map(s => s.trim());
    return parts[parts.length - 1];
  }

  const groups = {};
  data.forEach(item => {
    const d = district(item[2]);
    if(!groups[d]) groups[d] = [];
    groups[d].push(item);
  });

  const body = document.getElementById('legend-body');
  const noMatch = document.getElementById('no-match');

  function render(filter){
    const f = (filter || '').trim().toLowerCase();
    body.innerHTML = '';
    let any = false;
    Object.keys(groups).forEach(d => {
      const items = groups[d].filter(it =>
        !f || it[1].toLowerCase().includes(f) || it[2].toLowerCase().includes(f)
      );
      if(items.length === 0) return;
      any = true;
      const groupEl = document.createElement('div');
      groupEl.className = 'district-group';
      const title = document.createElement('div');
      title.className = 'district-name';
      title.textContent = d;
      groupEl.appendChild(title);
      const ul = document.createElement('ul');
      ul.className = 'linga-list';
      items.forEach(it => {
        const li = document.createElement('li');
        li.className = 'linga-item';
        li.innerHTML = `<span class="bead">${it[0]}</span>
          <span class="linga-text">
            <div class="linga-name">${it[1]}</div>
            <div class="linga-place">${it[2]}</div>
          </span>`;
        ul.appendChild(li);
      });
      groupEl.appendChild(ul);
      body.appendChild(groupEl);
    });
    noMatch.style.display = any ? 'none' : 'block';
  }

  render('');
  document.getElementById('search').addEventListener('input', e => render(e.target.value));

  const legend = document.getElementById('legend');
  const toggleBtn = document.getElementById('legend-toggle');
  const closeBtn = document.getElementById('legend-close');
  closeBtn.addEventListener('click', () => {
    legend.classList.add('collapsed');
    toggleBtn.style.display = 'block';
  });
  toggleBtn.addEventListener('click', () => {
    legend.classList.remove('collapsed');
    toggleBtn.style.display = 'none';
  });
